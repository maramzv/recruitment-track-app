<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candidate Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #4a90e2; color: white; }
    .urgent { background: #ffe0e0; }
    .moderate { background: #fff3cd; }
    .good { background: #d4edda; }
    .form-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    input, select { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #357abd; }
    .alert-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .alert-item { padding: 10px; margin: 8px 0; border-radius: 6px; }
    .alert-red { background: #ffcccc; border-left: 4px solid red; }
    .alert-yellow { background: #fff3cd; border-left: 4px solid orange; }
  </style>
</head>
<body>
  <h1>Candidate Tracker</h1>

  <div class="alert-box">
    <h3>🚨 Candidates Needing Follow-Up</h3>
    <div id="alertList"><p>No alerts right now ✅</p></div>
  </div>

  <div class="form-box">
    <h3>Add Candidate</h3>
    <input id="name" placeholder="Full Name">
    <input id="role" placeholder="Role">
    <select id="stage">
      <option value="">-- Hiring Stage --</option>
      <option value="Applied">Applied</option>
      <option value="Screening">Screening</option>
      <option value="Interview 1">Interview 1</option>
      <option value="Interview 2">Interview 2</option>
      <option value="Offer">Offer</option>
      <option value="Hired">Hired</option>
      <option value="Rejected">Rejected</option>
    </select>
    <input id="lastContact" type="date">
    <input id="email" placeholder="Email">
    <button onclick="addCandidate()">Add Candidate</button>
  </div>

  <table>
    <thead>
      <tr><th>Name</th><th>Role</th><th>Stage</th><th>Email</th><th>Last Contact</th><th>Status</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const candidates = [
      { name: "Alex Johnson", role: "Developer", stage: "Interview 1", email: "alex@email.com", lastContact: "2025-07-01" },
      { name: "Maria Garcia", role: "Designer", stage: "Screening", email: "maria@email.com", lastContact: "2025-07-10" },
      { name: "Sam Lee", role: "Manager", stage: "Offer", email: "sam@email.com", lastContact: "2025-06-25" }
    ];

    function formatContactField(dateStr) {
      const date = new Date(dateStr);
      const days = Math.floor((new Date() - date) / 86400000);
      const formatted = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      return `${days} days (${formatted})`;
    }

    function renderAlerts(candidateList) {
      const today = new Date();
      const atRisk = candidateList.filter(c => Math.floor((today - new Date(c.lastContact)) / 86400000) >= 7);
      const alertList = document.getElementById("alertList");
      if (atRisk.length === 0) { alertList.innerHTML = "<p>No alerts right now ✅</p>"; return; }
      alertList.innerHTML = atRisk.map(c => {
        const days = Math.floor((today - new Date(c.lastContact)) / 86400000);
        const cls = days >= 10 ? "alert-red" : "alert-yellow";
        const icon = days >= 10 ? "🔴" : "🟡";
        return `<div class="alert-item ${cls}">${icon} <strong>${c.name}</strong> — ${c.role} — ${c.stage} — No update for ${days} days</div>`;
      }).join("");
    }

    function renderTable() {
      candidates.sort((a, b) => new Date(a.lastContact) - new Date(b.lastContact));
      document.getElementById("tableBody").innerHTML = "";
      candidates.forEach(c => {
        const days = Math.floor((new Date() - new Date(c.lastContact)) / 86400000);
        let urgencyClass = "good", urgencyLabel = "✅ Good";
        if (days > 14) { urgencyClass = "urgent"; urgencyLabel = "🔴 Urgent"; }
        else if (days > 7) { urgencyClass = "moderate"; urgencyLabel = "🟡 Follow Up"; }
        document.getElementById("tableBody").innerHTML += `
          <tr class="${urgencyClass}">
            <td>${c.name}</td><td>${c.role}</td><td>${c.stage || "—"}</td><td>${c.email}</td>
            <td>${formatContactField(c.lastContact)}</td>
            <td>${urgencyLabel}</td>
          </tr>`;
      });
      renderAlerts(candidates);
    }

    function addCandidate() {
      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;
      const stage = document.getElementById("stage").value;
      const email = document.getElementById("email").value;
      const lastContact = document.getElementById("lastContact").value;
      if (!name || !lastContact) { alert("Name and Last Contact are required!"); return; }
      candidates.push({ name, role, stage, email, lastContact });
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
